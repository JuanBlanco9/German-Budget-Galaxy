<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Supplier Profile Preview — Budget Galaxy</title>
<style>
  :root {
    --bg: #0a0e1a;
    --panel: #121828;
    --panel-2: #1a2135;
    --border: #252d42;
    --text: #e8ebf5;
    --text-dim: #8892a8;
    --accent: #4fc3f7;
    --accent-dim: #2a6a88;
    --good: #4ade80;
    --warn: #fbbf24;
    --bad: #f87171;
    --govt: #c084fc;
    --individual: #60a5fa;
    --foreign: #fb923c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5;
  }
  .layout { display: grid; grid-template-columns: 320px 1fr; min-height: 100vh; }
  .sidebar {
    background: var(--panel); border-right: 1px solid var(--border);
    overflow-y: auto; max-height: 100vh;
  }
  .sidebar h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-dim); padding: 20px 20px 10px; margin: 0; }
  .sidebar input { width: calc(100% - 40px); margin: 0 20px 10px; padding: 8px 10px;
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 4px; font-size: 13px; }
  .sidebar ul { list-style: none; margin: 0; padding: 0; }
  .sidebar li {
    padding: 10px 20px; border-bottom: 1px solid var(--border); cursor: pointer;
    transition: background 0.1s;
  }
  .sidebar li:hover { background: var(--panel-2); }
  .sidebar li.active { background: var(--accent-dim); color: white; }
  .sidebar .sup-name { font-weight: 500; font-size: 13px; margin-bottom: 3px; }
  .sidebar .sup-meta { font-size: 11px; color: var(--text-dim); display: flex; gap: 8px; }
  .sidebar .sup-rank { color: var(--accent); font-weight: 600; }

  .main { padding: 40px 50px; overflow-y: auto; max-height: 100vh; }
  .header { display: flex; align-items: start; justify-content: space-between;
    margin-bottom: 30px; gap: 30px; }
  .header h1 { margin: 0; font-size: 26px; font-weight: 600; line-height: 1.2; }
  .header .subtitle { color: var(--text-dim); margin-top: 6px; font-size: 14px; }
  .header .rank-pill {
    display: inline-block; padding: 3px 10px; background: var(--accent-dim); color: white;
    border-radius: 20px; font-size: 12px; font-weight: 600; margin-right: 10px;
  }
  .header-right { display: flex; flex-direction: column; align-items: end; gap: 4px; }
  .big-num { font-size: 32px; font-weight: 700; color: var(--accent); }
  .big-num-label { color: var(--text-dim); font-size: 12px; text-transform: uppercase; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 20px;
  }
  .card h3 { margin: 0 0 15px 0; font-size: 12px; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--text-dim); }
  .card.full { grid-column: 1 / -1; }

  .kv { display: grid; grid-template-columns: 140px 1fr; gap: 8px 15px;
    font-size: 13px; }
  .kv .k { color: var(--text-dim); }
  .kv .v { color: var(--text); }
  .kv .v a { color: var(--accent); text-decoration: none; }
  .kv .v a:hover { text-decoration: underline; }

  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 600; margin-right: 4px;
  }
  .badge.active { background: rgba(74, 222, 128, 0.15); color: var(--good); }
  .badge.dissolved, .badge.liquidation, .badge.administration {
    background: rgba(248, 113, 113, 0.15); color: var(--bad); }
  .badge.medium { background: rgba(251, 191, 36, 0.15); color: var(--warn); }
  .badge.low { background: rgba(74, 222, 128, 0.15); color: var(--good); }
  .badge.high { background: rgba(248, 113, 113, 0.15); color: var(--bad); }
  .badge.govt { background: rgba(192, 132, 252, 0.15); color: var(--govt); }
  .badge.individual { background: rgba(96, 165, 250, 0.15); color: var(--individual); }
  .badge.foreign { background: rgba(251, 146, 60, 0.15); color: var(--foreign); }

  /* spend chart */
  .spend-row { display: grid; grid-template-columns: 180px 1fr 90px; gap: 12px;
    align-items: center; padding: 6px 0; font-size: 13px; }
  .spend-row .dept { color: var(--text); }
  .spend-row .bar-wrap { background: var(--panel-2); height: 18px; border-radius: 3px; }
  .spend-row .bar { background: var(--accent); height: 100%; border-radius: 3px; }
  .spend-row .amount { text-align: right; color: var(--text-dim); font-variant-numeric: tabular-nums; }

  /* officers table */
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; color: var(--text-dim); font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.5px; padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: 11px; }
  td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }

  /* ownership chain */
  .chain-container { display: flex; flex-direction: column; gap: 30px; }
  .chain-title { font-size: 12px; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 10px; }
  .chain-steps { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
  .hop {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 14px; min-width: 140px; max-width: 260px;
  }
  .hop.terminal.individual { border-color: var(--individual); box-shadow: 0 0 0 1px var(--individual); }
  .hop.terminal.government { border-color: var(--govt); box-shadow: 0 0 0 1px var(--govt); }
  .hop.terminal.foreign { border-color: var(--foreign); box-shadow: 0 0 0 1px var(--foreign); }
  .hop .hop-name { font-weight: 500; font-size: 13px; }
  .hop .hop-kind { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .hop .hop-src { margin-top: 6px; }
  .hop .hop-src a { color: var(--accent); font-size: 11px; text-decoration: none; }
  .arrow { color: var(--text-dim); font-size: 20px; }
  .wikidata-chip { font-size: 10px; padding: 1px 6px; border-radius: 3px;
    background: rgba(79, 195, 247, 0.15); color: var(--accent); margin-top: 4px;
    display: inline-block; }

  .src-list { font-size: 12px; color: var(--text-dim); }
  .src-list a { color: var(--accent); text-decoration: none; }

  .empty { color: var(--text-dim); font-style: italic; padding: 20px 0; text-align: center; }
  .tooltip { position: relative; }
  .tooltip:hover::after {
    content: attr(data-tip); position: absolute; bottom: 100%; left: 50%;
    transform: translateX(-50%); background: #000; color: white; padding: 4px 8px;
    border-radius: 3px; font-size: 11px; white-space: nowrap; z-index: 10;
  }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <h2>UK Suppliers · FY 2024</h2>
    <input type="text" id="search" placeholder="Search suppliers..." />
    <ul id="supplier-list"></ul>
  </aside>
  <main class="main" id="main">
    <div class="empty">Loading…</div>
  </main>
</div>

<script>
const fmtGBP = n => {
  if (n == null) return '—';
  if (n >= 1e9) return '£' + (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '£' + (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '£' + (n/1e3).toFixed(1) + 'K';
  return '£' + n.toLocaleString();
};

const fmtDate = s => s || '—';

let indexData = [];
let currentNumber = null;

async function loadIndex() {
  const r = await fetch('_index.json');
  indexData = await r.json();
  renderList('');
  // auto-select #1 on initial load
  if (indexData.length) loadProfile(indexData[0].company_number);
}

function renderList(filter) {
  const ul = document.getElementById('supplier-list');
  const q = filter.toLowerCase();
  const filtered = indexData.filter(s =>
    !q || s.display_name.toLowerCase().includes(q) || s.company_number.includes(q)
  );
  ul.innerHTML = filtered.slice(0, 200).map(s => `
    <li data-num="${s.company_number}" ${s.company_number === currentNumber ? 'class="active"' : ''}>
      <div class="sup-name">${escapeHtml(s.display_name)}</div>
      <div class="sup-meta">
        <span class="sup-rank">#${s.rank}</span>
        <span>${fmtGBP(s.total_gbp_2024)}</span>
        <span>${s.category}</span>
      </div>
    </li>
  `).join('');
  ul.querySelectorAll('li').forEach(li => {
    li.onclick = () => loadProfile(li.dataset.num);
  });
}

document.getElementById('search').oninput = e => renderList(e.target.value);

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"]/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

async function loadProfile(num) {
  currentNumber = num;
  // update active in list
  document.querySelectorAll('.sidebar li').forEach(li => {
    li.classList.toggle('active', li.dataset.num === num);
  });
  const r = await fetch(num + '.json');
  if (!r.ok) {
    document.getElementById('main').innerHTML = '<div class="empty">Profile not found.</div>';
    return;
  }
  const p = await r.json();
  document.getElementById('main').innerHTML = renderProfile(p);
}

function renderProfile(p) {
  const id = p.identity || {};
  const spend = p.spend_profile || {};
  const fin = p.financial_health;
  const gov = p.governance;
  const own = p.ownership_chain;

  const maxSpend = Math.max(...((spend.by_department || []).map(d => d.amount_gbp)), 1);

  return `
    <div class="header">
      <div>
        <h1>${escapeHtml(id.official_name || p.display_name)}</h1>
        <div class="subtitle">
          <span class="rank-pill">#${spend.rank}</span>
          <span class="badge ${id.status}">${id.status || '?'}</span>
          <span class="badge">${spend.category || ''}</span>
          ${id.ch_url ? `<a href="${id.ch_url}" target="_blank" style="color:var(--accent);margin-left:10px;font-size:12px;">↗ Companies House</a>` : ''}
        </div>
      </div>
      <div class="header-right">
        <div class="big-num-label">Total FY 2024</div>
        <div class="big-num">${fmtGBP(spend.total_gbp_2024)}</div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Identity</h3>
        <div class="kv">
          <div class="k">CH Number</div><div class="v">${id.ch_number || '—'}</div>
          <div class="k">Jurisdiction</div><div class="v">${id.jurisdiction || '—'}</div>
          <div class="k">Incorporated</div><div class="v">${fmtDate(id.incorporated)} <span style="color:var(--text-dim)">(${id.age_years ?? '—'} yr)</span></div>
          <div class="k">Type</div><div class="v">${id.type || '—'}</div>
          <div class="k">SIC codes</div><div class="v">${(id.sic_codes || []).join(', ') || '—'}</div>
          <div class="k">Industry</div><div class="v">${(id.sic_labels || []).join(', ') || '—'}</div>
          <div class="k">Registered office</div><div class="v">${[id.registered_office?.locality, id.registered_office?.postal_code, id.registered_office?.country].filter(Boolean).join(', ') || '—'}</div>
        </div>
      </div>

      <div class="card">
        <h3>Financial Health</h3>
        ${fin ? `
          <div class="kv">
            <div class="k">Last filing</div><div class="v">${fmtDate(fin.last_filing_date)}</div>
            <div class="k">Period end</div><div class="v">${fmtDate(fin.period_end)}</div>
            <div class="k">Accounts type</div><div class="v">${fin.accounts_type_description || '—'}</div>
            <div class="k">Next due</div><div class="v">${fmtDate(fin.next_accounts_due)} ${fin.overdue ? '<span class="badge dissolved">OVERDUE</span>' : ''}</div>
            ${fin.pdf?.path ? `<div class="k">Accounts PDF</div><div class="v"><a href="../${fin.pdf.path.split('data/')[1] ? 'recipients/uk/supplier_financials/' + fin.pdf.path.split('/').pop() : fin.pdf.path}" target="_blank">↗ ${fin.pdf.size_mb} MB</a></div>` : ''}
          </div>
        ` : '<div class="empty">No financial data available</div>'}
      </div>
    </div>

    <div class="grid">
      <div class="card full">
        <h3>Spend by Department · FY 2024</h3>
        ${(spend.by_department || []).map(d => `
          <div class="spend-row">
            <div class="dept">${escapeHtml(d.dept_name)}</div>
            <div class="bar-wrap"><div class="bar" style="width:${(d.amount_gbp/maxSpend*100).toFixed(1)}%"></div></div>
            <div class="amount">${fmtGBP(d.amount_gbp)}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Governance · Board</h3>
        ${gov ? `
          <div class="kv" style="margin-bottom:15px">
            <div class="k">Active directors</div><div class="v">${gov.active_directors?.length || 0}</div>
            <div class="k">All active officers</div><div class="v">${gov.officers_active_count || 0}</div>
            <div class="k">Resigned historical</div><div class="v">${gov.officers_resigned_count || 0}</div>
            <div class="k">Board turnover</div><div class="v"><span class="badge ${gov.board_turnover_signal}">${gov.board_turnover_signal}</span> ratio ${gov.board_turnover_ratio}</div>
          </div>
          <table>
            <thead><tr><th>Director</th><th>Since</th><th>Nationality</th></tr></thead>
            <tbody>
              ${(gov.active_directors || []).slice(0, 8).map(d => `
                <tr>
                  <td><strong>${escapeHtml(d.name || '—')}</strong></td>
                  <td>${fmtDate(d.appointed_on)}</td>
                  <td>${escapeHtml(d.nationality || '—')}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        ` : '<div class="empty">No governance data</div>'}
      </div>

      <div class="card">
        <h3>Ownership · Direct PSCs</h3>
        ${gov && gov.direct_psc_count ? `
          <div class="kv" style="margin-bottom:15px">
            <div class="k">Direct PSCs</div><div class="v">${gov.direct_psc_count}</div>
            <div class="k">Resolution</div><div class="v">${renderResolutionBadge(own?.resolution)}</div>
          </div>
          ${renderUboSummary(own?.ubo_summary)}
        ` : (gov?.direct_psc_statements?.length ? `
          <div class="kv"><div class="k">Status</div><div class="v">${escapeHtml(gov.direct_psc_statements[0]?.statement || '')}</div></div>
        ` : '<div class="empty">No PSC data</div>')}
      </div>
    </div>

    ${own && own.chains?.length ? `
    <div class="card full">
      <h3>Ownership Chain — walked via CH PSC + Wikidata</h3>
      <div class="chain-container">
        ${own.chains.map((chain, i) => `
          <div>
            <div class="chain-title">Chain ${i+1} · ${chain.length} hop${chain.length !== 1 ? 's' : ''} → ${renderTerminalLabel(chain[chain.length-1])}</div>
            <div class="chain-steps">
              ${chain.map((hop, idx) => renderHop(hop, idx === chain.length - 1)).filter(Boolean).join('<div class="arrow">→</div>')}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
    ` : ''}

    <div class="card full">
      <h3>Sources · All claims on this page are cited</h3>
      <div class="src-list">
        ${(p.sources || []).map(s => `
          <div style="padding:4px 0">
            <span style="color:var(--text-dim)">${s.section}</span>
            → <span style="color:var(--text)">${s.type}</span>
            ${s.url ? `&nbsp;<a href="${s.url}" target="_blank">↗ ${s.url.substring(0, 80)}${s.url.length > 80 ? '…' : ''}</a>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
    <div style="height:40px"></div>
  `;
}

function renderResolutionBadge(r) {
  if (!r) return '—';
  const map = {
    government: ['govt', 'Government'],
    individual: ['individual', 'Individual UBO'],
    foreign_via_wikidata: ['foreign', 'Foreign (Wikidata)'],
    foreign_unresolved: ['foreign', 'Foreign Unresolved'],
    partial_foreign: ['foreign', 'Partial Foreign'],
    partial_foreign_wd: ['foreign', 'Partial Foreign'],
    partial_unresolved: ['medium', 'Partial Unresolved'],
    partial_with_wd: ['foreign', 'Partial with WD'],
  };
  const [cls, label] = map[r] || ['', r];
  return `<span class="badge ${cls}">${label}</span>`;
}

function renderUboSummary(s) {
  if (!s) return '';
  const parts = [];
  if (s.ultimate_individuals?.length)
    parts.push(`<div style="margin:8px 0"><strong style="color:var(--individual)">Individual UBOs:</strong> ${s.ultimate_individuals.map(escapeHtml).join(', ')}</div>`);
  if (s.ultimate_governments?.length)
    parts.push(`<div style="margin:8px 0"><strong style="color:var(--govt)">Government:</strong> ${s.ultimate_governments.map(escapeHtml).join(', ')}</div>`);
  if (s.ultimate_foreign_countries?.length)
    parts.push(`<div style="margin:8px 0"><strong style="color:var(--foreign)">Foreign chain terminates in:</strong> ${s.ultimate_foreign_countries.map(escapeHtml).join(', ')}</div>`);
  return parts.join('') || '<div class="empty">No clear UBO</div>';
}

function renderHop(hop, isTerminal) {
  if (!hop || typeof hop !== 'object') return '';
  const res = hop.resolution || '';
  let terminalCls = '';
  if (isTerminal) {
    if (res === 'individual') terminalCls = 'terminal individual';
    else if (res === 'government') terminalCls = 'terminal government';
    else if (res.includes('foreign')) terminalCls = 'terminal foreign';
  }
  const wd = hop.wikidata;
  return `
    <div class="hop ${terminalCls}">
      <div class="hop-name">${escapeHtml(hop.name || hop.resolution || '?')}</div>
      <div class="hop-kind">${(hop.kind || '').replace(/-person-with-significant-control$/, '')}</div>
      ${hop.jurisdiction ? `<div style="font-size:11px;color:var(--foreign);margin-top:3px">${escapeHtml(hop.jurisdiction)}</div>` : ''}
      ${wd ? `<div class="wikidata-chip">Wikidata: ${wd.qid}</div>` : ''}
      ${hop.source?.url ? `<div class="hop-src"><a href="${hop.source.url}" target="_blank">↗ source</a></div>` : ''}
    </div>
  `;
}

function renderTerminalLabel(hop) {
  if (!hop || typeof hop !== 'object') return '?';
  const res = hop.resolution || '';
  if (res === 'individual') return `<strong style="color:var(--individual)">${escapeHtml(hop.name)}</strong> (individual)`;
  if (res === 'government') return `<strong style="color:var(--govt)">${escapeHtml(hop.name)}</strong> (govt)`;
  if (res.includes('foreign')) return `<strong style="color:var(--foreign)">${escapeHtml(hop.jurisdiction || hop.name || '')}</strong>`;
  return escapeHtml(hop.resolution || '?');
}

loadIndex();
</script>
</body>
</html>
